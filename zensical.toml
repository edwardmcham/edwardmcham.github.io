# =============================================================================
# emcham.io — Zensical site configuration
#
# Customizations beyond the project scaffold are documented inline below.
# Everything else is scaffold default / native Zensical behavior.
# =============================================================================

[project]
site_name = "emcham.io"
site_description = "EDWARD McHAM | Senior Technical Writer / Documentation Engineer"
site_author = "Edward McHam"
site_url = "https://edwardmcham.github.io/"

# "Blog" points to index.md — the home page doubles as the blog's
# landing page rather than having its own separate blog/index.md.
nav = [
    { "Home" = "index.md" },
    { "Resume" = "resume.md" },
    { "Portfolio" = "portfolio.md" },
    { "Blog" = "blog.md" },
]

extra_css = [
    "stylesheets/glightbox.min.css",
    "stylesheets/extra.css",
]
extra_javascript = [
    "javascripts/glightbox.min.js",
    "javascripts/extra.js",
]

[project.theme]
features = [
  "navigation.tabs",
  "navigation.sections",
  "navigation.top",
  "search.highlight",
  "toc.follow",
  "navigation.footer"
]
favicon = "assets/favicon.png"
custom_dir = "overrides"   # -> overrides/partials/social.html

[project.theme.font]
text = "Montserrat"
code = "JetBrains Mono"

# Palette toggle for automatic mode
[[project.theme.palette]]
media = "(prefers-color-scheme)"
toggle.icon = "lucide/sun-moon"
toggle.name = "Switch to light mode"

# Palette toggle for light mode
[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

# Palette toggle for dark mode
[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "lucide/moon"
toggle.name = "Switch to system preference"

# -----------------------------------------------------------------------
# site_author_email declared before the social array that depends on it,
# so the single-sourced setting reads first, not as an afterthought.
# Every mailto: link site-wide (footer + inline rows) reads from this
# one value — see main.py and overrides/partials/social.html.
# -----------------------------------------------------------------------
[project.extra]
site_author_email = "edward.mcham@gmail.com"

# -----------------------------------------------------------------------
# Single source of truth for every contact/social icon on the site — both
# the footer (overrides/partials/social.html) and the inline row on the
# home/resume pages (main.py's social_icons() macro) read this same list.
# Edit an icon, link, or name here once; it updates everywhere.
#
# Email's `link` is intentionally blank — the real address comes from
# site_author_email above instead, single-sourced in one setting.
# -----------------------------------------------------------------------
[[project.extra.social]]
icon = "fontawesome/solid/envelope"
link = ""
name = "Email Eddie »"

[[project.extra.social]]
icon = "fontawesome/solid/phone"
link = "tel:+19034311974"
name = "Call Eddie »"

[[project.extra.social]]
icon = "fontawesome/brands/linkedin"
link = "https://www.linkedin.com/in/edwardmcham/"
name = "Eddie on LinkedIn »"

[[project.extra.social]]
icon = "fontawesome/solid/globe"
link = "https://emcham.io"
name = "Website »"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/edwardmcham"
name = "Eddie on GitHub »"

[[project.extra.social]]
icon = "fontawesome/brands/youtube"
link = "https://www.youtube.com/@emcham-io/playlists"
name = "Eddie on YouTube »"

# Stored relative to docs/ (no leading "../"). The footer template
# applies Zensical's `| url` filter to this one link so it resolves
# correctly regardless of page depth (root vs. /resume/ vs. /portfolio/)
# — see overrides/partials/social.html.
[[project.extra.social]]
icon = "fontawesome/solid/file-pdf"
link = "assets/RESUME_EDWARD_McHAM_Senior_Technical_Writer_Documentation_Engineer.pdf"
name = "Download PDF resume »"

# -----------------------------------------------------------------------
# Markdown extensions, grouped: core parsing first, then feature-
# specific integrations built on top of it.
# -----------------------------------------------------------------------

# Allows Markdown syntax inside raw HTML blocks flagged markdown="1".
[project.markdown_extensions.md_in_html]

# Highlight is required alongside SuperFences below -- it's what
# SuperFences uses internally to perform syntax highlighting on code
# blocks, even though no highlighting options are being customized here.
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true

# Enables --8<-- "file" includes (used by index.md for the hero block).
[project.markdown_extensions.pymdownx.snippets]
base_path = ["includes"]
check_paths = true

# Enables real triple-backtick code fences (without this, fenced blocks
# fall through as plain paragraph text instead of literal code -- this
# is what caused Mermaid diagrams and HTML code examples to render as
# broken live content instead of staying as code). The custom_fences
# entry below additionally tells Zensical to treat ```mermaid blocks
# as Mermaid.js diagrams rather than plain code.
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
    { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]

# Icon shortcodes, e.g. :fontawesome-solid-envelope:
[project.markdown_extensions.pymdownx.emoji]
emoji_index = "zensical.extensions.emoji.twemoji"
emoji_generator = "zensical.extensions.emoji.to_svg"

[project.markdown_extensions.zensical.extensions.glightbox]
auto = false
width = "600px"
height = "auto"

# render_by_default = true turns on Jinja2 processing ({{ }} expressions)
# site-wide, not just on pages that opt in individually.
[project.markdown_extensions.zensical.extensions.macros]
render_by_default = true